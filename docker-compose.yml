services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  openbao:
    image: openbao/openbao
    command: server -config=/etc/openbao/openbao.hcl
    environment:
      BAO_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - ./deploy/openbao/config/openbao.hcl:/etc/openbao/openbao.hcl:ro
      - openbao_data:/openbao/file
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "bao status -address=http://127.0.0.1:8200 >/dev/null 2>&1 || test $? -eq 2"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: src/PatchHound.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${API_ENVIRONMENT:-Development}
      ConnectionStrings__PatchHound: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      AzureAd__ClientId: ${AZURE_AD_CLIENT_ID}
      AzureAd__TenantId: ${AZURE_AD_TENANT_ID}
      AzureAd__Audience: ${AZURE_AD_AUDIENCE}
      AzureAd__EnablePiiLogging: ${AZURE_AD_ENABLE_PII_LOGGING:-false}
      OpenBao__Address: ${OPENBAO_INTERNAL_ADDR:-http://openbao:8200}
      OpenBao__Token: ${OPENBAO_TOKEN:-}
      OpenBao__KvMount: ${OPENBAO_KV_MOUNT:-patchhound}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
    depends_on:
      - postgres
      - openbao
    # No ports — internal only, accessed by frontend via Docker network

  worker:
    build:
      context: .
      dockerfile: src/PatchHound.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: ${WORKER_ENVIRONMENT:-Development}
      ConnectionStrings__PatchHound: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      OpenBao__Address: ${OPENBAO_INTERNAL_ADDR:-http://openbao:8200}
      OpenBao__Token: ${OPENBAO_TOKEN:-}
      OpenBao__KvMount: ${OPENBAO_KV_MOUNT:-patchhound}
    depends_on:
      - postgres
      - openbao

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${FRONTEND_NODE_ENV:-production}
      API_BASE_URL: http://api:8080/api
      SESSION_SECRET: ${SESSION_SECRET}
      ENTRA_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      ENTRA_TENANT_ID: ${AZURE_AD_TENANT_ID}
      ENTRA_REDIRECT_URI: ${FRONTEND_ORIGIN}/auth/callback
      ENTRA_SCOPES: ${ENTRA_SCOPES}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  openbao_data:
